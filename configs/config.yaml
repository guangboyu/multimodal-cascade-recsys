# VLM-Rec configuration: single source of truth for every pipeline stage.
# Override any key on the CLI, e.g.:  uv run vlmrec data -o dataset.max_reviews=200000

seed: 42
device: auto            # auto | cuda | cpu

paths:
  root: "."
  data: data
  raw: data/raw
  processed: data/processed
  images: data/images
  embeddings: data/embeddings

dataset:
  hf_repo: McAuley-Lab/Amazon-Reviews-2023
  category: Video_Games
  max_reviews: null       # null -> full corpus; int -> dev subsample (streamed)
  positive_rating: 4.0    # rating >= this -> "strong" positive (multi-task label, used later)

filtering:
  dedup: true             # keep earliest interaction per (user, item)
  k_core: 5               # iterative k-core on BOTH users and items
  max_iters: 20

split:
  scheme: leave_last_out  # temporal, per user: last -> test, 2nd-last -> valid, rest -> train
  min_seq_len: 3

images:
  enabled: true
  max_images: null        # null -> all filtered items; int caps for dev
  size: large             # preferred size; fallback order: large -> hi_res -> thumb
  num_workers: 16
  timeout: 10
  retries: 2

text:
  model: sentence-transformers/all-MiniLM-L6-v2
  fields: [title, description, features]
  max_chars: 1000
  batch_size: 256

features:
  # winning ablation combo: +1.5% overall R@100 vs text+image; cold-start neutral (documented)
  sources: [text, image, vlm]  # item content blocks: text | image | vlm (canonical order)

vlm:
  model: Qwen/Qwen2.5-VL-7B-Instruct
  # vllm's PyPI wheel links libcudart.so.13 (CUDA 13) — unusable on this 12.8 driver, the same
  # too-new-CUDA pitfall as torch cu130 (docs/PITFALLS.md). transformers backend runs the model.
  backend: transformers     # vllm | transformers (auto-falls-back if vllm import fails)
  fallback_model: Qwen/Qwen2.5-VL-3B-Instruct  # used when falling back from vllm
  max_new_tokens: 320
  temperature: 0.0
  max_pixels: 589824        # 768x768 image-token cap per image
  gpu_memory_utilization: 0.90
  shard_size: 2000          # resume granularity for the multi-hour profile job
  max_desc_chars: 800

image_emb:
  model: ViT-B-32
  pretrained: laion2b_s34b_b79k
  batch_size: 256

retrieval:
  feature_mode: content   # content (multimodal) | hybrid (+ id/price/category) | id (collaborative baseline)
  out_dim: 128
  hidden: [256]
  temperature: 0.05
  epochs: 10
  batch_size: 4096
  lr: 0.002
  eval_every: 1
  ks: [10, 50, 100, 500]

ranking:
  epochs: 3
  batch_size: 2048
  lr: 0.001
  n_neg_train: 4          # sampled negatives per positive (training)
  n_neg_eval: 100         # sampled negatives per user (GAUC/AUC eval)
  eval_user_sample: null  # cap GAUC eval to a user sample (needed at 1M+ user scale)
  max_seq_len: 30         # behavior-sequence length for DIN
  d_model: 128
  n_tasks: 2              # click + satisfaction (rating>=4)
  use_multimodal: true
  use_din: true
  use_cross: true
  use_mmoe: true

rerank:
  cand_k: 200             # retrieval candidates per user (cascade + hard-negative source)
  hard_neg_frac: 0.5      # fraction of ranker negatives drawn from retrieval candidates
  prerank_epochs: 2       # distilled pre-ranker
  mmr_lambda: 0.7         # MMR relevance/diversity tradeoff (1.0 = pure relevance)
  final_k: 20             # final list size after post-processing

sid:
  levels: 3               # semantic-ID depth (codes per item)
  codebook_size: 256      # codes per level
  latent_dim: 64
  hidden: [512, 256]
  beta: 0.25              # commitment-loss weight
  epochs: 300
  batch_size: 2048
  lr: 0.001

tiger:
  d_model: 128
  n_layers: 4
  n_heads: 4
  max_hist: 20            # history items (x levels tokens each)
  epochs: 5
  batch_size: 256
  lr: 0.001
  beam: 20
  eval_users: 10000

serving:
  ranker_ckpt: data/rerank/ranker_cascade.pt  # cascade-consistent ranker (falls back to model_full)
  k_retrieve: ${rerank.cand_k}  # FAISS candidates fetched per request
  k_prerank: 50                 # pre-ranker cut fed to the heavy ranker
  use_onnx: false               # score the heavy ranker via ONNX Runtime instead of torch
  index: flat                   # flat (exact) | hnsw | ivf — ANN for big catalogs

demo:
  api: http://localhost:8000    # serving API the Streamlit UI talks to (HTTP only, no model code)
  port: 8501
