# Serving the VLM-Rec cascade + the Streamlit demo UI. `data/` (trained artifacts) is mounted
# read-only. Week 6 can extend this with redis (cache), prometheus + grafana (monitoring).
services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
    environment:
      - OMP_NUM_THREADS=4
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s      # registry load (features + checkpoints) takes a while on cold start

  demo:
    build: .
    command: ["uv", "run", "streamlit", "run", "src/vlmrec/serving/demo_app.py",
              "--server.port", "8501", "--server.address", "0.0.0.0", "--server.headless", "true"]
    ports:
      - "8501:8501"
    environment:
      - VLMREC_API=http://api:8000   # UI fetches everything (incl. images) through the API
    depends_on:
      api:
        condition: service_healthy
